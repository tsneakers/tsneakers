<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TSNEAKERS | Shoe Store</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #f9f9f9; text-align: center; }
        .header { padding: 20px; background: #fff; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 10px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .card img { width: 100%; border-radius: 8px; height: auto; }
        .request-card { 
            background: #222; color: white; padding: 30px; border-radius: 15px; 
            margin-top: 40px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>TSNEAKERS</h1>
        <p>Your premium source for high-quality footwear.</p>
    </div>

    <div class="gallery">
        <div class="card"><img src="shoe1.jpg" alt="Sneaker 1"></div>
        <div class="card"><img src="shoe2.jpg" alt="Sneaker 2"></div>
        <div class="card"><img src="shoe3.jpg" alt="Sneaker 3"></div>
        <div class="card"><img src="shoe4.jpg" alt="Sneaker 4"></div>
        <div class="card"><img src="shoe5.jpg" alt="Sneaker 5"></div>
    </div>

    <div class="request-card">
        <h2>Custom Request</h2>
        <p style="font-size: 1.2rem;">For sneakers not posted, reach out with description to purchase one.</p>
    </div>

</body>
</html>
